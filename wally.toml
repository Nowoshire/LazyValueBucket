[package]
name = "nowoshire/lazyvaluebucket"
description = "An implementation of lazily evaluated token buckets in Luau."

version = "0.1.3"
license = "MIT"

registry = "https://github.com/UpliftGames/wally-index"
repository = "https://github.com/Nowoshire/LazyValueBucket"
realm = "shared"

exclude = ["*"]
include = ["src", "src/*", "default.project.json", "README.md", "wally.toml"]

[dependencies]
Signal = "nowoshire/namedsignal@^2.0.0"
TypeUtils = "nowoshire/luautypeutils@^0"